/* Custom Animations */

      /* --- Auth Page Styles (THEME-AWARE) --- */
      .auth-body {
        background-color: var(--color-background);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: 'Inter', sans-serif;
        height: 100vh;
      }

      .auth-h1 { 
        font-family: 'Poppins', sans-serif; 
        font-weight: bold; 
        margin: 0; 
        font-size: 2rem; 
        color: var(--color-text-primary);
      }
      .auth-p { 
        font-size: 14px; 
        font-weight: 300; 
        line-height: 20px; 
        letter-spacing: 0.5px; 
        margin: 20px 0 30px; 
        color: var(--color-text-secondary);
      }
      .auth-span { 
        font-size: 12px; 
        color: var(--color-text-secondary);
      }

      .auth-button {
        border-radius: 25px;
        border: 1px solid var(--color-primary);
        background-color: var(--color-primary);
        color: var(--color-primary-text);
        font-size: 12px;
        font-weight: bold;
        padding: 12px 45px;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: transform 80ms ease-in, box-shadow 0.3s ease;
      }
      .auth-button:hover {
        box-shadow: 0 0 20px rgba(15, 185, 177, 0.5);
      }
      .auth-button:active { transform: scale(0.95); }
      .auth-button:focus { outline: none; }
      .auth-button.ghost {
        background-color: transparent;
        border-color: var(--color-text-primary);
        color: var(--color-text-primary);
        transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      }
      .auth-button.ghost:hover {
        background-color: var(--color-surface-soft);
      }

      .auth-form {
        background-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 0 50px;
        height: 100%;
        text-align: center;
      }
      
      .auth-input-group { position: relative; margin-top: 10px; }
      .auth-input {
        background-color: var(--color-surface-soft);
        border: 1px solid var(--color-border);
        color: var(--color-text-primary);
        padding: 12px 15px;
        width: 100%;
        font-size: 14px;
        border-radius: 8px;
        transition: all 0.3s;
      }
      .auth-input:focus {
        outline: none;
        background-color: var(--color-surface);
        box-shadow: 0 0 0 2px var(--color-primary);
      }
      .auth-input ~ .bar {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 0;
        height: 2px;
        background: var(--color-primary);
        transition: 0.3s ease;
      }
      .auth-input:focus ~ .bar { width: 100%; left: 0; }
      .auth-label {
        color: var(--color-text-secondary);
        font-size: 14px;
        font-weight: normal;
        position: absolute;
        pointer-events: none;
        left: 15px;
        top: 12px;
        transition: 0.2s ease all;
      }
      .auth-input:focus ~ .auth-label,
      .auth-input-group.is-filled .auth-label {
        top: -18px;
        font-size: 10px;
        color: var(--color-primary);
        font-weight: bold;
      }
      
      .auth-container {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 20px;
        box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.1);
        position: relative;
        overflow: hidden;
        width: 768px;
        max-width: 95vw;
        min-height: 520px;
      }
      .form-container {
        position: absolute;
        top: 0;
        height: 100%;
        transition: all 0.6s ease-in-out;
      }
      .sign-in-container { left: 0; width: 50%; z-index: 2; }
      .sign-up-container { left: 0; width: 50%; opacity: 0; z-index: 1; }
      .auth-container.right-panel-active .sign-in-container { transform: translateX(100%); }
      .auth-container.right-panel-active .sign-up-container { transform: translateX(100%); opacity: 1; z-index: 5; animation: show 0.6s; }
      
      @keyframes show {
        0%, 49.99% { opacity: 0; z-index: 1; }
        50%, 100% { opacity: 1; z-index: 5; }
      }
      
      .overlay-container {
        position: absolute;
        top: 0;
        left: 50%;
        width: 50%;
        height: 100%;
        overflow: hidden;
        transition: transform 0.6s ease-in-out;
        z-index: 100;
      }
      .auth-container.right-panel-active .overlay-container { transform: translateX(-100%); }
      .auth-overlay {
        background: linear-gradient(to right, var(--color-primary), var(--color-secondary));
        background-repeat: no-repeat;
        background-size: cover;
        background-position: 0 0;
        color: var(--color-primary-text);
        position: relative;
        left: -100%;
        height: 100%;
        width: 200%;
        transform: translateX(0);
        transition: transform 0.6s ease-in-out;
      }
      .auth-container.right-panel-active .auth-overlay { transform: translateX(50%); }
      .overlay-panel {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 0 40px;
        text-align: center;
        top: 0;
        height: 100%;
        width: 50%;
        transform: translateX(0);
        transition: transform 0.6s ease-in-out;
      }
      .overlay-panel .auth-h1, .overlay-panel .auth-p {
          color: var(--color-primary-text);
      }
      .overlay-left { transform: translateX(-20%); }
      .auth-container.right-panel-active .overlay-left { transform: translateX(0); }
      .overlay-right { right: 0; transform: translateX(0); }
      .auth-container.right-panel-active .overlay-right { transform: translateX(20%); }

      .social-container { margin: 20px 0; }
      .social-container a {
        border: 1px solid var(--color-border);
        border-radius: 50%;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        margin: 0 5px;
        height: 40px;
        width: 40px;
        color: var(--color-text-secondary);
        transition: background-color 0.3s ease, border-color 0.3s ease;
      }
      .social-container a:hover {
        background-color: var(--color-surface-soft);
        border-color: var(--color-primary);
      }

      @media (max-width: 768px) {
        .auth-body {
          padding: 2rem 1rem;
          height: auto;
          min-height: 100vh;
        }
        .auth-container {
          width: 100%;

          padding: 0 2rem;

          margin: 15px 0 20px;

          max-width: 360px;
          min-height: 560px;
        }

          padding: 0 1.5rem;
        }
        .social-container a {
          height: 36px;
          width: 36px;
        }
        .form-container {
          width: 100%;
        }
        .sign-in-container,
        .sign-up-container {
          width: 100%;
        }

          transform: translateX(100%);

        }
        .auth-container.right-panel-active .sign-in-container {
          transform: translateX(-100%);
        }
        .auth-container.right-panel-active .sign-up-container {
          transform: translateX(0);

        }
        .overlay-container {
          display: none;
        }

      /* TransitionLink View Transition API */
      @keyframes --item-image-clip-animation-in {

        to { clip-path: inset(0%); }
      }
      @keyframes --item-image-clip-animation-out {
        from { clip-path: inset(0%); }
        to { clip-path: inset(var(--clip-to)); }

      ::view-transition-old(item-image) {
        animation: 0.5s cubic-bezier(0.4, 0, 0.2, 1) both --item-image-clip-animation-out;

      }
      
      /* Keyframes for new Welcome Screen */
      @keyframes svg-draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes svg-fill-in-primary {
        from { fill: transparent; }
        to { fill: var(--color-primary); }
      }
      @keyframes logo-fade-in {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes subtle-fade-in-up {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes welcome-fade-out {
        from { opacity: 1; }
        to { opacity: 0; pointer-events: none; }

      /* NEW LUXURY PIXE STYLES */
      .reel-progress-bar {

      }

      /* NEW EDITOR ANNOTATION STYLES */
      .is-annotated {
        outline: 2px dashed var(--theme-primary, #0fb9b1);
        outline-offset: 4px;
        box-shadow: 0 0 25px rgba(15, 185, 177, 0.5);
        transition: outline 0.2s, box-shadow 0.2s;

      }
    </style>
